<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Extract, learn, and chat with your PDF documents</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Extract, learn, and chat with your PDF documents</h1>
            <p>Ask questions based on your documents — intelligent answers from your PDFs</p>
        </div>

        <div class="messages-area" id="chatMessagesContainer">
            <div class="empty-chat" id="emptyChatMsg">
                💬 Start a conversation — ask anything about your PDF documents.
            </div>
        </div>

        <div class="input-panel">
            <div id="errorContainer" class="error-container"></div>
            
            <div class="input-group">
                <textarea 
                    id="promptInput" 
                    placeholder="Ask a medical or document-related question..." 
                    rows="2"
                ></textarea>
                
                <div class="action-buttons">
                    <button id="sendBtn" class="send-btn">✈️ Send message</button>
                    <button id="clearBtn" class="clear-btn">🗑️ Clear chat</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
